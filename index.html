<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC 2026 — Live Knockout Forecast</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DARK (default) ── */
:root {
  --bg:       #111111;
  --bg2:      #1c1c1e;
  --bg3:      #2c2c2e;
  --card:     #1c1c1e;
  --border:   #38383a;
  --text:     #f2f2f2;
  --muted:    #8e8e93;
  --faint:    #48484a;
  --green:    #32d74b;
  --green-bg: #0a2010;
  --green-d:  #30d158;
  --blue:     #0a84ff;
  --blue-bg:  #001535;
  --blue-d:   #409cff;
  --amber:    #ff9f0a;
  --amber-bg: #251a00;
  --amber-d:  #ffb340;
  --red:      #ff453a;
  --red-bg:   #2a0a08;
  --red-dot:  #ff453a;
}

/* ── LIGHT ── */
[data-theme="light"] {
  --bg:       #f2f2f7;
  --bg2:      #ffffff;
  --bg3:      #e5e5ea;
  --card:     #ffffff;
  --border:   #d1d1d6;
  --text:     #1a1a1a;
  --muted:    #6c6c70;
  --faint:    #aeaeb2;
  --green:    #1c8a34;
  --green-bg: #e3f7e8;
  --green-d:  #1c8a34;
  --blue:     #0060d0;
  --blue-bg:  #e5f0fb;
  --blue-d:   #0060d0;
  --amber:    #9a5600;
  --amber-bg: #fff3e0;
  --amber-d:  #9a5600;
  --red:      #c0281f;
  --red-bg:   #fdecea;
  --red-dot:  #e0332a;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; transition: background .2s, color .2s; }

/* ── HEADER ── */
.header { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
.header-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
.live-pill { display: flex; align-items: center; gap: 4px; background: var(--red-bg); color: var(--red); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red-dot); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.header-right { display: flex; align-items: center; gap: 6px; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px; font-size: 13px; cursor: pointer; color: var(--muted); -webkit-tap-highlight-color: transparent; }
.sub-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
.last-updated { font-size: 11px; color: var(--faint); }
.api-status  { font-size: 11px; }

/* ── TODAY BANNER ── */
.today-wrap { background: var(--green-bg); border-bottom: 0.5px solid var(--green); position: sticky; top: 56px; z-index: 15; }
.today-hdr { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.today-label { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .06em; }
.today-toggle { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 5px; }
.today-cards { display: flex; gap: 8px; padding: 0 12px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.today-cards::-webkit-scrollbar { display: none; }
.today-collapsed { font-size: 11px; color: var(--green); padding: 0 12px 8px; font-style: italic; }

.tc { flex-shrink: 0; width: 140px; background: var(--card); border: 0.5px solid var(--border); border-radius: 11px; padding: 8px 9px; }
.tc.live-now { border-color: var(--red); }
.tc-time { font-size: 9px; font-weight: 600; color: var(--green); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.tc-live-badge { background: var(--red); color: #fff; font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 5px; animation: pulse 1.5s infinite; }
.tc-flags { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.tc-flag { font-size: 21px; }
.tc-score { font-size: 14px; font-weight: 700; }
.tc-vs { font-size: 10px; color: var(--faint); }
.tc-names { display: flex; justify-content: space-between; }
.tc-name { font-size: 9px; color: var(--muted); flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tc-meta { font-size: 9px; color: var(--faint); margin-top: 2px; }

/* ── VIEWS ── */
.view { display: none; padding: 10px 10px 80px; }
.view.active { display: block; }

/* ── STATS BAR ── */
.stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 2px 0 10px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── GROUP CARDS ── */
.group-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.group-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 13px; background: var(--bg3); border-bottom: 0.5px solid var(--border); }
.group-name { font-size: 13px; font-weight: 600; }
.chip { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
.chip-done { background: var(--green-bg); color: var(--green-d); }
.chip-pend { background: var(--amber-bg); color: var(--amber-d); }
.team-row { display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-top: 0.5px solid var(--border); min-height: 42px; }
.team-pos { font-size: 11px; color: var(--faint); width: 13px; text-align: center; font-weight: 700; }
.team-flag { font-size: 18px; width: 24px; }
.team-name { font-size: 13px; flex: 1; }
.team-gd { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }
.team-pts { font-size: 13px; font-weight: 700; width: 40px; text-align: right; color: var(--muted); }
.conf-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-left: 4px; vertical-align: middle; }
.q1 .team-name { color: var(--green-d); font-weight: 600; }
.q1 .team-pos  { color: var(--green); }
.q2 .team-name { color: var(--blue-d); font-weight: 600; }
.q2 .team-pos  { color: var(--blue); }
.q3 .team-name { color: var(--amber-d); }
.q3 .team-pos  { color: var(--amber); }
.elim .team-name { color: var(--faint); text-decoration: line-through; }
.elim .team-pts  { color: var(--faint); }
.sep { border-top: 1px dashed var(--bg3) !important; }

/* ── BRACKET ── */
.round-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: 12px 0 6px; display: flex; align-items: center; gap: 8px; }
.round-label::after { content:''; flex:1; height:.5px; background: var(--border); }
.match-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.match-meta { display: flex; justify-content: space-between; align-items: center; padding: 6px 13px; background: var(--bg3); border-bottom: 0.5px solid var(--border); flex-wrap: wrap; gap: 4px; }
.match-meta-left { font-size: 11px; color: var(--muted); }
.status-conf { font-size: 10px; font-weight: 700; color: var(--green); }
.status-proj { font-size: 10px; font-weight: 700; color: var(--amber); }
.match-team { display: flex; align-items: center; gap: 10px; padding: 10px 13px; min-height: 44px; }
.match-team + .match-team { border-top: 0.5px solid var(--border); }
.match-team.conf { background: var(--green-bg); }
.match-team.conf .match-name { color: var(--green-d); font-weight: 600; }
.match-team.tbd .match-name { color: var(--faint); font-style: italic; }
.match-flag { font-size: 20px; width: 26px; }
.match-name { font-size: 14px; flex: 1; }
.match-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.badge-conf { background: var(--green-bg); color: var(--green-d); }
.badge-proj { background: var(--amber-bg); color: var(--amber-d); }
.badge-tbd  { background: var(--bg3); color: var(--faint); }
.info-box { background: var(--amber-bg); border-radius: 10px; padding: 10px 13px; font-size: 12px; color: var(--amber-d); margin-bottom: 10px; line-height: 1.5; }

/* ── 3RD PLACE ── */
.third-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
.third-row { display: flex; align-items: center; gap: 8px; padding: 9px 13px; border-top: 0.5px solid var(--border); min-height: 44px; }
.third-rank { font-size: 12px; font-weight: 700; width: 20px; text-align: center; }
.rank-in { color: var(--green); }
.rank-out { color: var(--faint); }
.third-flag { font-size: 18px; width: 24px; }
.third-name { font-size: 13px; flex: 1; }
.third-grp  { font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 6px; border-radius: 8px; margin-left: 3px; }
.third-gd  { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }
.third-pts { font-size: 13px; font-weight: 700; width: 40px; text-align: right; color: var(--muted); }
.third-row.in .third-name  { color: var(--amber-d); font-weight: 600; }
.third-row.out .third-name { color: var(--faint); }
.cut-line { text-align: center; font-size: 11px; color: var(--amber-d); font-weight: 700; padding: 5px; background: var(--amber-bg); border-top: 1px dashed var(--amber); border-bottom: 1px dashed var(--amber); }

/* ── GAMES TAB ── */
.section-hdr { display: flex; align-items: center; gap: 8px; padding: 12px 2px 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
.section-count { font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 7px; border-radius: 10px; }
.section-sep { flex: 1; height: 0.5px; background: var(--border); }
.section-chev { font-size: 13px; color: var(--muted); width: 16px; text-align: center; }

.day-header { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: 8px 2px 5px; }

.fixture { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 7px; overflow: hidden; }
.fixture.live-now { border-color: var(--red); }
.fx-head { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; background: var(--bg3); border-bottom: 0.5px solid var(--border); flex-wrap: wrap; gap: 3px; }
.fx-time { font-size: 10px; font-weight: 600; color: var(--text); }
.fx-time.is-live { color: var(--red); }
.live-badge { background: var(--red); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 6px; margin-left: 4px; animation: pulse 1.5s infinite; }
.fx-meta { font-size: 10px; color: var(--faint); }
.fx-body { display: flex; align-items: center; padding: 9px 10px; gap: 4px; }
.fx-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.fx-flag { font-size: 23px; }
.fx-name { font-size: 11px; color: var(--text); font-weight: 500; text-align: center; }
.fx-name.proj { color: var(--amber-d); font-style: italic; font-weight: 400; }
.fx-name.tbd-name { color: var(--faint); font-style: italic; }
.fx-center { width: 54px; text-align: center; flex-shrink: 0; }
.fx-score { font-size: 19px; font-weight: 700; }
.fx-vs    { font-size: 12px; color: var(--faint); }
.fx-round { font-size: 9px; color: var(--faint); margin-top: 1px; }
.fx-done .fx-name { color: var(--muted); }

/* ── BOTTOM NAV ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--bg2); border-top: 0.5px solid var(--border); z-index: 20; }
.bottom-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 4px 12px; font-size: 10px; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.bottom-btn.active { color: var(--green); }
.bottom-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; }

.loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

@media (min-width: 600px) {
  body { max-width: 430px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,.4); min-height: 100vh; }
  .bottom-nav { max-width: 430px; left: 50%; transform: translateX(-50%); }
}
</style>

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function getCESTDate() {
  return new Date(Date.now()+2*3600000).toISOString().slice(0,10);
}
function fmtDate(iso) {
  return new Date(iso+'T12:00:00Z').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function getStat(stats,name) {
  const s=stats.find(s=>s.name===name); return s?(parseInt(s.value??s.displayValue)||0):0;
}
function gdStr(v) { return v>0?'+'+v:''+v; }
function flag(abbr) { return FLAGS[abbr]||FLAGS[abbr?.toUpperCase()]||'🏳'; }
function flagByName(n) { return NAME_TO_FLAG[n]||'🏳'; }
function isConf(e) { return e.note?.description?.toLowerCase().includes('advance'); }
function isElim(e) { return e.note?.description?.toLowerCase().includes('eliminat'); }
function scoreKey(a,b) { return [a,b].sort().join('|'); }

/* ══════════════════════════════════════════
   ESPN FETCH
══════════════════════════════════════════ */
async function fetchStandings() {
  const r=await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
  if(!r.ok) throw new Error('standings '+r.status);
  const data=await r.json();
  groupData={};
  (data.children||[]).forEach(group=>{
    const key=(group.name||'').match(/Group ([A-L])/i)?.[1]?.toUpperCase();
    if(!key) return;
    const entries=(group.standings?.entries||group.entries||[]).map(e=>{
      const s=e.stats||[];
      return {team:e.team,abbr:e.team?.abbreviation||'',name:e.team?.displayName||'?',
              pts:getStat(s,'points'),gp:getStat(s,'gamesPlayed'),gf:getStat(s,'pointsFor'),
              ga:getStat(s,'pointsAgainst'),gd:getStat(s,'pointDifferential'),
              confirmed:isConf(e),eliminated:isElim(e)};
    }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    groupData[key]={letter:key,entries,name:group.name};
  });
}

async function fetchScoresForDate(dateStr) {
  try {
    const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`);
    if(!r.ok) return;
    const data=await r.json();
    (data.events||[]).forEach(ev=>{
      const comp=ev.competitions?.[0]; if(!comp) return;
      const teams=comp.competitors||[]; if(teams.length<2) return;
      const t1=teams[0],t2=teams[1];
      const n1=t1.team.displayName,n2=t2.team.displayName;
      const k=scoreKey(n1,n2);
      const s1=t1.score??'',s2=t2.score??'';
      const hasScore=s1!==''&&s2!=='';
      const status=comp.status?.type?.name||'';
      const clock=comp.status?.displayClock||'';
      const detail=comp.status?.type?.shortDetail||'';
      const entry={team1:n1,team2:n2,s1,s2,status,clock,detail,
                   isLive:status.includes('IN_PROGRESS')||status.includes('HALFTIME'),
                   isDone:hasScore&&(status.includes('FINAL')||status.includes('FULL')||detail==='FT'||detail==='Full Time'),
                   hasScore};
      scoreMap[k]=entry;
      if(ev.date){
        const utc=new Date(ev.date);
        const cest=new Date(utc.getTime()+2*3600000);
        const cestDate=cest.toISOString().slice(0,10);
        const cestTime=cest.toISOString().slice(11,16);
        const venue=comp.venue?.fullName||comp.venue?.address?.city||'';
        if(!allEvents[cestDate]) allEvents[cestDate]=[];
        if(!allEvents[cestDate].find(e=>e.key===k))
          allEvents[cestDate].push({...entry,key:k,cestTime,venue,flag1:flagByName(n1),flag2:flagByName(n2)});
      }
    });
  } catch(e){}
}

async function fetchAllScores() {
  const today=getCESTDate().replace(/-/g,'');
  const groupDates=[];
  for(let d=new Date('2026-06-10T00:00:00Z');;d.setUTCDate(d.getUTCDate()+1)){
    const s=d.toISOString().slice(0,10).replace(/-/g,'');
    if(s>'20260627') break;
    if(s<=today) groupDates.push(s);
  }
  const koDates=[...new Set(FIXTURES.map(f=>f.espnDate))].filter(d=>d<=today);
  allEvents={};
  await Promise.all([...new Set([...groupDates,...koDates])].map(d=>fetchScoresForDate(d)));
  buildMatchResults();
}

function buildMatchResults() {
  matchResults={};
  FIXTURES.forEach(f=>{
    const r1=resolveSlot(f.slot1),r2=resolveSlot(f.slot2);
    if(!r1.name||!r2.name) return;
    const sc=scoreMap[scoreKey(r1.name,r2.name)];
    if(!sc||!sc.isDone) return;
    const sc1=parseInt(sc.s1)||0,sc2=parseInt(sc.s2)||0;
    const w=sc1>sc2?{name:sc.team1,flag:flagByName(sc.team1)}:{name:sc.team2,flag:flagByName(sc.team2)};
    const l=sc1>sc2?{name:sc.team2,flag:flagByName(sc.team2)}:{name:sc.team1,flag:flagByName(sc.team1)};
    matchResults[f.id]={winner:w,loser:l};
  });
}

function resolveSlot(slot) {
  if(!slot) return {name:null,flag:'🔲',conf:false,proj:false};
  if(slot.prev){
    const mr=matchResults[slot.prev];
    if(!mr) return {name:`W ${slot.prev}`,flag:'🔲',conf:false,proj:false};
    const t=slot.loser?mr.loser:mr.winner;
    return {name:t.name,flag:t.flag,conf:true,proj:false};
  }
  if(slot.pool) return {name:`Best 3rd (${slot.pool})`,flag:'🔲',conf:false,proj:false};
  const g=groupData[slot.grp];
  if(!g) return {name:`${slot.pos}${slot.grp}`,flag:'🔲',conf:false,proj:false};
  const e=g.entries[slot.pos-1];
  if(!e) return {name:`${slot.pos}${slot.grp}`,flag:'🔲',conf:false,proj:false};
  return {name:e.name,flag:flag(e.abbr),conf:e.confirmed,proj:!e.confirmed};
}

function renderGroups() {
  const LETTERS='ABCDEFGHIJKL'.split('');
  let confirmed=0,projected=0,pending=0;
  LETTERS.forEach(k=>{
    const g=groupData[k]; if(!g) return;
    g.entries.forEach((e,i)=>{if(i<2&&e.confirmed)confirmed++;else if(i<2)projected++;});
    if(g.entries.reduce((s,e)=>s+e.gp,0)/g.entries.length<3) pending++;
  });
  let html=`<div class="stats-bar">
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${confirmed}</div><div class="stat-label">Confirmed</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${projected}</div><div class="stat-label">Projected</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${pending}</div><div class="stat-label">Groups active</div></div>
  </div>
  <div class="legend">
    <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>1st</div>
    <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>2nd</div>
    <div class="leg"><span class="leg-dot" style="background:var(--amber)"></span>3rd · wildcard?</div>
  </div>`;
  LETTERS.forEach(k=>{
    const g=groupData[k]; if(!g) return;
    const avg=g.entries.reduce((s,e)=>s+e.gp,0)/(g.entries.length||1);
    const qn=g.entries.slice(0,2).filter(e=>e.confirmed).map(e=>e.name.split(' ').pop());
    const chip=qn.length===2?`<span class="chip chip-done">✓ ${qn.join(' &amp; ')}</span>`
              :qn.length===1?`<span class="chip chip-done">✓ ${qn[0]}</span>`
              :avg>=3?`<span class="chip chip-done">✓ Complete</span>`
              :`<span class="chip chip-pend">${3-Math.floor(avg)} match${3-Math.floor(avg)>1?'es':''} left</span>`;
    html+=`<div class="group-card"><div class="group-header"><span class="group-name">Group ${k}</span>${chip}</div>`;
    g.entries.forEach((e,i)=>{
      const pc=i===0?'q1':i===1?'q2':i===2?'q3':'';
      const ec=e.eliminated?'elim':'';
      const cd=e.confirmed&&i<2?'<span class="conf-dot"></span>':'';
      const sep=i===2?'sep':'';
      html+=`<div class="team-row ${pc} ${ec} ${sep}">
        <span class="team-pos">${i+1}</span><span class="team-flag">${flag(e.abbr)}</span>
        <span class="team-name">${e.name}${cd}</span>
        <span class="team-gd">${gdStr(e.gd)}</span>
        <span class="team-pts">${e.pts}pt${e.pts!==1?'s':''}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('groups').innerHTML=html;
}

function renderThird() {

  const thirds=[];
  LETTERS.forEach(k=>{const g=groupData[k];if(!g||g.entries.length<3)return;thirds.push({...g.entries[2],grp:k});});
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const gl=Object.values(groupData).filter(g=>g.entries.reduce((s,e)=>s+e.gp,0)/g.entries.length<3).length;
  let html=`<div class="info-box">Best 8 of 12 third-place teams advance · pts → GD → GF.<br>${gl>0?`⚠ ${gl} group${gl>1?'s':''} still playing.`:'✓ All groups complete.'}</div>
  <div class="third-card"><div class="group-header"><span class="group-name">3rd-place ranking</span><span class="chip chip-pend">${thirds.length}/12 groups</span></div>`;
  thirds.forEach((t,i)=>{
    const adv=i<8;
    if(i===8) html+=`</div><div class="cut-line">— cut line · bottom 4 eliminated —</div><div class="third-card">`;
    html+=`<div class="third-row ${adv?'in':'out'}">
      <span class="third-rank ${adv?'rank-in':'rank-out'}">${i+1}</span>
      <span class="third-flag">${flag(t.abbr)}</span>

      <span class="third-gd">${gdStr(t.gd)}</span>
      <span class="third-pts">${t.pts}pt${t.pts!==1?'s':''}</span>
    </div>`;
  });
  for(let i=thirds.length;i<12;i++){
    if(i===8) html+=`</div><div class="cut-line">— cut line · bottom 4 eliminated —</div><div class="third-card">`;
    html+=`<div class="third-row"><span class="third-rank" style="color:var(--faint)">${i+1}</span>
      <span class="third-flag">🔲</span><span class="third-name" style="color:var(--faint);font-style:italic">Pending…</span>
      <span class="third-gd">—</span><span class="third-pts" style="color:var(--faint)">—</span></div>`;
  }
  html+=`</div>`;
  document.getElementById('third').innerHTML=html;
}

/* ══════════════════════════════════════════
   RENDER: GAMES
══════════════════════════════════════════ */
function fxCardGS(ev) {
  const isLive=ev.isLive,isDone=ev.isDone,has=ev.hasScore;
  const center = (has||isLive)
    ? `<div class="fx-score" style="${isLive?'color:var(--red)':''}">${ev.s1}–${ev.s2}</div><div class="fx-round">${isLive?`LIVE ${ev.clock}`:isDone?'FT':ev.clock||''}</div>`
    : `<div class="fx-vs">vs</div><div class="fx-round">Group</div>`;
  return `<div class="fixture ${isLive?'live-now':''} ${isDone?'fx-done':''}">
    <div class="fx-head">
      <span class="fx-time ${isLive?'is-live':''}">🕐 ${ev.cestTime} CEST${isLive?`<span class="live-badge">LIVE ${ev.clock||''}</span>`:''}</span>
      <span class="fx-meta">${ev.venue||''}</span>
    </div>
    <div class="fx-body">
      <div class="fx-team"><span class="fx-flag">${ev.flag1}</span><span class="fx-name">${ev.team1}</span></div>
      <div class="fx-center">${center}</div>
      <div class="fx-team"><span class="fx-flag">${ev.flag2}</span><span class="fx-name">${ev.team2}</span></div>
    </div>
  </div>`;
}

function fxCardKO(f) {
  const r1=resolveSlot(f.slot1),r2=resolveSlot(f.slot2);
  const sc=scoreMap[scoreKey(r1.name||'',r2.name||'')];
  const isLive=sc?.isLive,isDone=sc?.isDone,has=sc?.hasScore;
  let center;
  if(sc&&(has||isLive)){
    const s1=sc.team1===r1.name?sc.s1:sc.s2,s2=sc.team1===r1.name?sc.s2:sc.s1;
    const lbl=isLive?`LIVE ${sc.clock}`:isDone?'FT':sc.clock||'';
    center=`<div class="fx-score" style="${isLive?'color:var(--red)':''}">${s1}–${s2}</div><div class="fx-round">${lbl}</div>`;
  } else {
    center=`<div class="fx-vs">vs</div><div class="fx-round">${f.round}</div>`;
  }
  const n1cls=r1.proj?'proj':(!r1.name||r1.name.startsWith('W ')||r1.name.startsWith('Best'))?'tbd-name':'';
  const n2cls=r2.proj?'proj':(!r2.name||r2.name.startsWith('W ')||r2.name.startsWith('Best'))?'tbd-name':'';
  return `<div class="fixture ${isLive?'live-now':''} ${isDone?'fx-done':''}">
    <div class="fx-head">
      <span class="fx-time ${isLive?'is-live':''}">🕐 ${f.cest} CEST${isLive?`<span class="live-badge">LIVE ${sc?.clock||''}</span>`:''}</span>
      <span class="fx-meta">${f.id} · ${f.venue}</span>
    </div>
    <div class="fx-body">
      <div class="fx-team"><span class="fx-flag">${r1.flag}</span><span class="fx-name ${n1cls}">${r1.name||'TBD'}</span></div>
      <div class="fx-center">${center}</div>
      <div class="fx-team"><span class="fx-flag">${r2.flag}</span><span class="fx-name ${n2cls}">${r2.name||'TBD'}</span></div>
    </div>
  </div>`;
}

function renderGames() {
  const todayStr=getCESTDate();

  /* collect all dates */
  const gsDates=Object.keys(allEvents).filter(d=>d>='2026-06-11'&&d<='2026-06-27').sort();
  const koDates=[...new Set(FIXTURES.map(f=>f.cestDate))].sort();
  const allDates=[...new Set([...gsDates,...koDates])].sort();

  /* split into played / upcoming */
  let playedHtml='', upcomingHtml='', playedCount=0, upcomingCount=0;

  allDates.forEach(date=>{
    const isPast=date<todayStr;
    const isToday=date===todayStr;
    const gsEvs=(allEvents[date]||[]).sort((a,b)=>a.cestTime.localeCompare(b.cestTime));
    const koFxs=FIXTURES.filter(f=>f.cestDate===date).sort((a,b)=>a.cest.localeCompare(b.cest));

    /* decide which bucket each item goes into */
    const playedGs=gsEvs.filter(ev=>ev.isDone||ev.hasScore);
    const upcomingGs=gsEvs.filter(ev=>!ev.isDone&&!ev.hasScore);
    const playedKo=koFxs.filter(f=>{
      const r1=resolveSlot(f.slot1),r2=resolveSlot(f.slot2);
      const sc=scoreMap[scoreKey(r1.name||'',r2.name||'')];
      return sc&&(sc.isDone||sc.hasScore);
    });
    const upcomingKo=koFxs.filter(f=>{
      const r1=resolveSlot(f.slot1),r2=resolveSlot(f.slot2);
      const sc=scoreMap[scoreKey(r1.name||'',r2.name||'')];
      return !sc||(!(sc.isDone||sc.hasScore));
    });

    /* PLAYED */
    if(playedGs.length+playedKo.length>0) {
      playedCount+=playedGs.length+playedKo.length;
      playedHtml+=`<div class="day-header">${fmtDate(date)}${isToday?' · Today':''}</div>`;
      playedGs.forEach(ev=>{playedHtml+=fxCardGS(ev);});
      playedKo.forEach(f=>{playedHtml+=fxCardKO(f);});
    }
    /* UPCOMING */
    if(upcomingGs.length+upcomingKo.length>0) {
      upcomingCount+=upcomingGs.length+upcomingKo.length;
      const rndLabel=upcomingKo.length?` · ${upcomingKo[0].round}`:'';
      upcomingHtml+=`<div class="day-header">${fmtDate(date)}${isToday?' · Today':''}${rndLabel}</div>`;
      upcomingGs.forEach(ev=>{upcomingHtml+=fxCardGS(ev);});
      upcomingKo.forEach(f=>{upcomingHtml+=fxCardKO(f);});
    }
  });

  const playedOpen   = document.getElementById('games-played-body')?.style.display !== 'none';
  const upcomingOpen = document.getElementById('games-upcoming-body')?.style.display === 'none' ? false : true;

  document.getElementById('games').innerHTML=`
    <div class="section-hdr" onclick="toggleSection('games-played')">
      <span class="section-title" style="color:var(--muted)">Played</span>
      <span class="section-count">${playedCount} matches</span>
      <span class="section-sep"></span>
      <span class="section-chev" id="games-played-chev">▸</span>
    </div>
    <div id="games-played-body" style="display:none">${playedHtml||'<div style="color:var(--faint);font-size:12px;padding:4px 2px 8px">No completed matches yet</div>'}</div>

    <div class="section-hdr" onclick="toggleSection('games-upcoming')">
      <span class="section-title" style="color:var(--text)">Upcoming</span>
      <span class="section-count">${upcomingCount} matches</span>
      <span class="section-sep"></span>
      <span class="section-chev" id="games-upcoming-chev">▾</span>
    </div>
    <div id="games-upcoming-body">${upcomingHtml||'<div style="color:var(--faint);font-size:12px;padding:4px 2px 8px">No upcoming matches</div>'}</div>`;
}

function toggleSection(id) {
  const body=document.getElementById(id+'-body');
  const chev=document.getElementById(id+'-chev');
  const open=body.style.display!=='none';
  body.style.display=open?'none':'';
  chev.textContent=open?'▸':'▾';
}

/* ══════════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════════ */
function switchTab(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setbn(id) {
  document.querySelectorAll('.bottom-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

loadData();
setInterval(loadData,60000);
</script>
