<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC 2026 — Live Knockout Forecast</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #111111;
  --bg2:      #1c1c1e;
  --bg3:      #2c2c2e;
  --card:     #1c1c1e;
  --border:   #38383a;
  --text:     #f2f2f2;
  --muted:    #8e8e93;
  --faint:    #48484a;
  --green:    #32d74b;
  --green-bg: #0a2010;
  --green-d:  #30d158;
  --blue:     #0a84ff;
  --blue-bg:  #001535;
  --blue-d:   #409cff;
  --amber:    #ff9f0a;
  --amber-bg: #251a00;
  --amber-d:  #ffb340;
  --red:      #ff453a;
  --red-bg:   #2a0a08;
  --red-dot:  #ff453a;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* Header */
.header { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.live-pill { display: flex; align-items: center; gap: 5px; background: var(--red-bg); color: var(--red); font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 20px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red-dot); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.refresh-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; color: var(--muted); }
.sub-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
.last-updated { font-size: 11px; color: var(--faint); }
.api-status { font-size: 11px; }

/* Nav */
.nav { display: flex; background: var(--bg2); border-bottom: 0.5px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { flex-shrink: 0; padding: 11px 14px; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); border-bottom: 2.5px solid transparent; cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
.nav-btn.active { color: var(--green); border-bottom-color: var(--green); }

/* Views */
.view { display: none; padding: 12px 12px 80px; }
.view.active { display: block; }

/* Stats bar */
.stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

.legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 4px 0 10px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Group cards */
.group-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.group-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 13px; background: var(--bg3); border-bottom: 0.5px solid var(--border); }
.group-name { font-size: 13px; font-weight: 600; color: var(--text); }
.chip { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
.chip-done { background: var(--green-bg); color: var(--green-d); }
.chip-pend { background: var(--amber-bg); color: var(--amber-d); }

.team-row { display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-top: 0.5px solid var(--border); min-height: 42px; }
.team-pos { font-size: 11px; color: var(--faint); width: 13px; text-align: center; font-weight: 700; }
.team-flag { font-size: 18px; width: 24px; }
.team-name { font-size: 13px; color: var(--text); flex: 1; }
.team-gd { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }
.team-pts { font-size: 13px; font-weight: 700; width: 40px; text-align: right; color: var(--muted); }
.conf-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-left: 4px; vertical-align: middle; }
.q1 .team-name { color: var(--green-d); font-weight: 600; }
.q1 .team-pos { color: var(--green); }
.q2 .team-name { color: var(--blue-d); font-weight: 600; }
.q2 .team-pos { color: var(--blue); }
.q3 .team-name { color: var(--amber-d); }
.q3 .team-pos { color: var(--amber); }
.elim .team-name { color: var(--faint); text-decoration: line-through; }
.elim .team-pts { color: var(--faint); }
.sep { border-top: 1px dashed var(--bg3) !important; }

/* Bracket */
.round-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: 12px 0 6px; display: flex; align-items: center; gap: 8px; }
.round-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
.match-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.match-meta { display: flex; justify-content: space-between; align-items: center; padding: 6px 13px; background: var(--bg3); border-bottom: 0.5px solid var(--border); flex-wrap: wrap; gap: 4px; }
.match-meta-left { font-size: 11px; color: var(--muted); }
.status-conf { font-size: 10px; font-weight: 700; color: var(--green); }
.status-proj { font-size: 10px; font-weight: 700; color: var(--amber); }
.match-team { display: flex; align-items: center; gap: 10px; padding: 10px 13px; min-height: 44px; }
.match-team + .match-team { border-top: 0.5px solid var(--border); }
.match-team.conf { background: var(--green-bg); }
.match-team.conf .match-name { color: var(--green-d); font-weight: 600; }
.match-team.tbd .match-name { color: var(--faint); font-style: italic; }
.match-flag { font-size: 20px; width: 26px; }
.match-name { font-size: 14px; color: var(--text); flex: 1; }
.match-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.badge-conf { background: var(--green-bg); color: var(--green-d); }
.badge-proj { background: var(--amber-bg); color: var(--amber-d); }
.badge-tbd { background: var(--bg3); color: var(--faint); }

/* Info box */
.info-box { background: var(--amber-bg); border-radius: 10px; padding: 10px 13px; font-size: 12px; color: var(--amber-d); margin-bottom: 10px; line-height: 1.5; }

/* 3rd place */
.third-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
.third-row { display: flex; align-items: center; gap: 8px; padding: 9px 13px; border-top: 0.5px solid var(--border); min-height: 44px; }
.third-rank { font-size: 12px; font-weight: 700; width: 20px; text-align: center; }
.rank-in { color: var(--green); }
.rank-out { color: var(--faint); }
.third-flag { font-size: 18px; width: 24px; }
.third-name { font-size: 13px; color: var(--text); flex: 1; }
.third-grp { font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 6px; border-radius: 8px; margin-left: 3px; }
.third-gd { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }
.third-pts { font-size: 13px; font-weight: 700; width: 40px; text-align: right; color: var(--muted); }
.third-row.in .third-name { color: var(--amber-d); font-weight: 600; }
.third-row.out .third-name { color: var(--faint); }
.cut-line { text-align: center; font-size: 11px; color: var(--amber-d); font-weight: 700; padding: 5px; background: var(--amber-bg); border-top: 1px dashed var(--amber); border-bottom: 1px dashed var(--amber); }

/* ===== GAMES TAB ===== */
.today-banner { background: var(--green-bg); border-bottom: 0.5px solid var(--green); padding: 10px 12px 12px; }
.today-banner-label { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.today-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
.today-scroll::-webkit-scrollbar { display: none; }
.today-no-games { font-size: 12px; color: var(--muted); padding: 4px 0; }

.tc { flex-shrink: 0; width: 145px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 9px 10px; }
.tc.live-now { border-color: var(--red); }
.tc-time { font-size: 10px; font-weight: 600; color: var(--green); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.tc-live-badge { background: var(--red); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 6px; animation: pulse 1.5s infinite; }
.tc-flags { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.tc-flag { font-size: 22px; }
.tc-score { font-size: 15px; font-weight: 700; color: var(--text); }
.tc-vs { font-size: 11px; color: var(--faint); }
.tc-names { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 4px; }
.tc-name { font-size: 10px; color: var(--muted); flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tc-meta { font-size: 10px; color: var(--faint); }

.day-header { display: flex; align-items: center; gap: 8px; padding: 14px 0 8px; }
.day-label { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }
.day-label.today-label { color: var(--green); }
.day-count { font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 7px; border-radius: 10px; }
.day-sep { flex: 1; height: 0.5px; background: var(--border); }

.fixture { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.fixture.live-now { border-color: var(--red); }
.fx-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: var(--bg3); border-bottom: 0.5px solid var(--border); flex-wrap: wrap; gap: 4px; }
.fx-time { font-size: 11px; font-weight: 600; color: var(--text); }
.fx-time.is-live { color: var(--red); }
.live-badge { background: var(--red); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 6px; margin-left: 4px; animation: pulse 1.5s infinite; }
.fx-meta { font-size: 10px; color: var(--faint); }
.fx-body { display: flex; align-items: center; padding: 10px 12px; gap: 4px; }
.fx-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.fx-flag { font-size: 24px; }
.fx-name { font-size: 11px; color: var(--text); font-weight: 500; text-align: center; }
.fx-name.proj { color: var(--amber-d); font-style: italic; font-weight: 400; }
.fx-name.tbd-name { color: var(--faint); font-style: italic; }
.fx-center { width: 56px; text-align: center; flex-shrink: 0; }
.fx-score { font-size: 20px; font-weight: 700; color: var(--text); }
.fx-vs { font-size: 12px; color: var(--faint); }
.fx-round { font-size: 9px; color: var(--faint); margin-top: 2px; }
.fx-done .fx-name { color: var(--muted); }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--bg2); border-top: 0.5px solid var(--border); z-index: 10; }
.bottom-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px 12px; font-size: 10px; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.bottom-btn.active { color: var(--green); }
.bottom-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; }

.loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.error-box { background: var(--red-bg); border-radius: 10px; padding: 12px; font-size: 12px; color: var(--red); margin: 12px; }

@media (min-width: 600px) {
  body { max-width: 430px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,.6); min-height: 100vh; }
  .bottom-nav { max-width: 430px; left: 50%; transform: translateX(-50%); }
}
</style>

const R32_MAP = Object.fromEntries(FIXTURES.filter(f=>f.round==='R32').map(f=>[f.id,f]));

let groupData    = {};
let scoreMap     = {};   // key: "TeamA|TeamB" (sorted) → {s1,s2,status,clock,team1,team2}
let matchResults = {};   // matchId → {winner:{name,flag}, loser:{name,flag}}
let allEvents    = {};   // cestDate → [{team1,team2,flag1,flag2,s1,s2,status,clock,cestTime,venue,round}]

/* ── Utilities ── */
function getCESTDate() {
  const d = new Date(Date.now() + 2*3600000);
  return d.toISOString().slice(0,10);
}
function getCESTTime() {
  const d = new Date(Date.now() + 2*3600000);
  return d.toISOString().slice(11,16);
}
function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00Z');
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function getStat(stats,name) {
  const s = stats.find(s=>s.name===name);
  return s ? (parseInt(s.value ?? s.displayValue)||0) : 0;
}
function gdStr(v) { return v>0 ? '+'+v : ''+v; }
function flag(abbr) { return FLAGS[abbr] || FLAGS[abbr?.toUpperCase()] || '🏳'; }
function flagByName(name) { return NAME_TO_FLAG[name] || '🏳'; }
function isConf(e) { return e.note?.description?.toLowerCase().includes('advance'); }
function isElim(e) { return e.note?.description?.toLowerCase().includes('eliminat'); }
function scoreKey(a,b) { return [a,b].sort().join('|'); }

/* ── Fetch standings ── */
async function fetchStandings() {
  const r = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
  if (!r.ok) throw new Error('standings '+r.status);
  const data = await r.json();
  groupData = {};
  (data.children||[]).forEach(group=>{
    const key = (group.name||'').match(/Group ([A-L])/i)?.[1]?.toUpperCase();
    if (!key) return;
    const entries = (group.standings?.entries||group.entries||[]).map(e=>{
      const s = e.stats||[];
      return { team:e.team, abbr:e.team?.abbreviation||'', name:e.team?.displayName||'?',
               pts:getStat(s,'points'), gp:getStat(s,'gamesPlayed'), gf:getStat(s,'pointsFor'),
               ga:getStat(s,'pointsAgainst'), gd:getStat(s,'pointDifferential'),
               confirmed:isConf(e), eliminated:isElim(e) };
    }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    groupData[key] = {letter:key,entries,name:group.name};
  });
}

/* ── Fetch scores for a given ESPN date string (YYYYMMDD) ── */
async function fetchScoresForDate(dateStr) {
  try {
    const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`);
    if (!r.ok) return;
    const data = await r.json();
    (data.events||[]).forEach(ev=>{
      const comp = ev.competitions?.[0]; if (!comp) return;
      const teams = comp.competitors||[]; if (teams.length<2) return;
      const t1 = teams[0], t2 = teams[1];
      const n1 = t1.team.displayName, n2 = t2.team.displayName;
      const k = scoreKey(n1,n2);
      const status = comp.status?.type?.name||'';
      const clock  = comp.status?.displayClock||'';
      const detail = comp.status?.type?.shortDetail||'';
      const entry = { team1:n1, team2:n2, s1:t1.score||'', s2:t2.score||'',
                      status, clock, detail,
                      isLive: status==='STATUS_IN_PROGRESS',
                      isDone: status==='STATUS_FINAL'||status==='STATUS_FULL_TIME'||detail==='FT' };
      scoreMap[k] = entry;
      /* also store in allEvents keyed by CEST date */
      if (ev.date) {
        const utc = new Date(ev.date);
        const cest = new Date(utc.getTime() + 2*3600000);
        const cestDate = cest.toISOString().slice(0,10);
        const cestTime = cest.toISOString().slice(11,16);
        const venue = comp.venue?.fullName || comp.venue?.address?.city || '';
        const grpName = ev.season?.displayName || ev.name || '';
        if (!allEvents[cestDate]) allEvents[cestDate] = [];
        /* avoid duplicates on re-fetch */
        if (!allEvents[cestDate].find(e=>e.key===k)) {
          allEvents[cestDate].push({...entry, key:k, cestTime, venue,
            flag1:flagByName(n1), flag2:flagByName(n2), evName:grpName});
        }
      }
    });
  } catch(e) {}
}

/* ── Fetch all relevant dates ── */
async function fetchAllScores() {
  const today = getCESTDate().replace(/-/g,'');
  /* group stage: Jun 10-27 (ESPN ET dates, one day buffer for late kickoffs) */
  const groupDates = [];
  for (let d = new Date('2026-06-10T00:00:00Z'); ; d.setUTCDate(d.getUTCDate()+1)) {
    const s = d.toISOString().slice(0,10).replace(/-/g,'');
    if (s > '20260627') break;
    if (s <= today) groupDates.push(s);
  }
  /* knockout stage ESPN dates */
  const knockoutDates = [...new Set(FIXTURES.map(f=>f.espnDate))].filter(d=>d<=today);
  const allDates = [...new Set([...groupDates, ...knockoutDates])];
  allEvents = {};
  await Promise.all(allDates.map(d=>fetchScoresForDate(d)));
  buildMatchResults();
}

/* ── Build match winners from scoreMap ── */
function buildMatchResults() {
  matchResults = {};
  FIXTURES.forEach(f=>{
    const {name1,flag1,name2,flag2} = resolveSlotNames(f.slot1,f.slot2);
    if (!name1||!name2) return;
    const k = scoreKey(name1,name2);
    const sc = scoreMap[k];
    if (!sc||!sc.isDone) return;
    const sc1 = parseInt(sc.s1)||0, sc2 = parseInt(sc.s2)||0;
    const w = sc1>sc2 ? {name:sc.team1,flag:flagByName(sc.team1)} : {name:sc.team2,flag:flagByName(sc.team2)};
    const l = sc1>sc2 ? {name:sc.team2,flag:flagByName(sc.team2)} : {name:sc.team1,flag:flagByName(sc.team1)};
    matchResults[f.id] = {winner:w,loser:l};
  });
}

/* ── Resolve slot to team info ── */
function resolveSlot(slot) {
  if (!slot) return {name:null,flag:'🔲',conf:false,proj:false};
  if (slot.prev) {
    const mr = matchResults[slot.prev];
    if (!mr) return {name:`W ${slot.prev}`,flag:'🔲',conf:false,proj:false};
    const t = slot.loser ? mr.loser : mr.winner;
    return {name:t.name, flag:t.flag, conf:true, proj:false};
  }
  if (slot.pool) return {name:`Best 3rd (${slot.pool})`,flag:'🔲',conf:false,proj:false};
  const g = groupData[slot.grp];
  if (!g) return {name:`${slot.pos}${slot.grp}`,flag:'🔲',conf:false,proj:false};
  const e = g.entries[slot.pos-1];
  if (!e) return {name:`${slot.pos}${slot.grp}`,flag:'🔲',conf:false,proj:false};
  return {name:e.name, flag:flag(e.abbr), conf:e.confirmed, proj:!e.confirmed};
}
function resolveSlotNames(s1,s2) {
  const r1=resolveSlot(s1), r2=resolveSlot(s2);
  return {name1:r1.name,flag1:r1.flag,name2:r2.name,flag2:r2.flag};
}

/* ── Main load ── */
async function loadData() {
  document.getElementById('ts').textContent='Refreshing…';
  try {
    await fetchStandings();
    await fetchAllScores();
    renderGroups(); renderBracket(); renderThird(); renderGames();
    document.getElementById('ts').textContent='Updated: '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' CEST';
    document.getElementById('api-status').innerHTML='<span style="color:var(--green)">● ESPN live</span>';
  } catch(e) {
    document.getElementById('ts').textContent='Error — tap ↻';
    document.getElementById('api-status').innerHTML='<span style="color:var(--red)">● offline</span>';
  }
}

function renderGroups() {
  const LETTERS='ABCDEFGHIJKL'.split('');
  let confirmed=0,projected=0,pending=0;
  LETTERS.forEach(k=>{
    const g=groupData[k]; if(!g) return;
    g.entries.forEach((e,i)=>{ if(i<2&&e.confirmed) confirmed++; else if(i<2) projected++; });
    const avg=g.entries.reduce((s,e)=>s+e.gp,0)/g.entries.length;
    if(avg<3) pending++;
  });
  let html=`<div class="stats-bar">
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${confirmed}</div><div class="stat-label">Confirmed</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${projected}</div><div class="stat-label">Projected</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${pending}</div><div class="stat-label">Groups active</div></div>
  </div>
  <div class="legend">
    <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>1st place</div>
    <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>2nd place</div>
    <div class="leg"><span class="leg-dot" style="background:var(--amber)"></span>3rd · wildcard?</div>
  </div>`;

  LETTERS.forEach(k=>{
    const g=groupData[k]; if(!g) return;
    const avgGP=g.entries.length?g.entries.reduce((s,e)=>s+e.gp,0)/g.entries.length:0;
    const complete=avgGP>=3;
    const qn=g.entries.slice(0,2).filter(e=>e.confirmed).map(e=>e.name.split(' ').pop());
    const chip=qn.length===2?`<span class="chip chip-done">✓ ${qn.join(' &amp; ')}</span>`
              :qn.length===1?`<span class="chip chip-done">✓ ${qn[0]}</span>`
              :complete?`<span class="chip chip-done">✓ Complete</span>`
              :`<span class="chip chip-pend">${3-Math.floor(avgGP)} match${3-Math.floor(avgGP)>1?'es':''} left</span>`;
    html+=`<div class="group-card"><div class="group-header"><span class="group-name">Group ${k}</span>${chip}</div>`;
    g.entries.forEach((e,i)=>{
      const pc=i===0?'q1':i===1?'q2':i===2?'q3':'';
      const ec=e.eliminated?'elim':'';
      const cd=e.confirmed&&i<2?'<span class="conf-dot"></span>':'';
      const sc=i===2?'sep':'';
      html+=`<div class="team-row ${pc} ${ec} ${sc}">
        <span class="team-pos">${i+1}</span><span class="team-flag">${flag(e.abbr)}</span>
        <span class="team-name">${e.name}${cd}</span>
        <span class="team-gd">${gdStr(e.gd)}</span>
        <span class="team-pts">${e.pts}pt${e.pts!==1?'s':''}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('groups').innerHTML=html;
}

function renderThird() {
  const LETTERS='ABCDEFGHIJKL'.split('');
  const thirds=[];
  LETTERS.forEach(k=>{
    const g=groupData[k]; if(!g||g.entries.length<3) return;
    const t=g.entries[2]; thirds.push({...t,grp:k});
  });
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const groupsLeft=Object.values(groupData).filter(g=>g.entries.reduce((s,e)=>s+e.gp,0)/g.entries.length<3).length;
  let html=`<div class="info-box">Best 8 of 12 third-place teams advance · ranked by pts → GD → GF.<br>${groupsLeft>0?`⚠ ${groupsLeft} group${groupsLeft>1?'s':''} still playing — ranking will change.`:'✓ All groups complete.'}</div>
  <div class="third-card"><div class="group-header"><span class="group-name">3rd-place ranking</span><span class="chip chip-pend">${thirds.length}/12 groups</span></div>`;
  thirds.forEach((t,i)=>{
    const adv=i<8;
    if(i===8) html+=`</div><div class="cut-line">— cut line · bottom 4 eliminated —</div><div class="third-card">`;
    html+=`<div class="third-row ${adv?'in':'out'}">
      <span class="third-rank ${adv?'rank-in':'rank-out'}">${i+1}</span>
      <span class="third-flag">${flag(t.abbr)}</span>
      <span class="third-name">${t.name}<span class="third-grp">${t.grp}</span></span>
      <span class="third-gd">${gdStr(t.gd)}</span>
      <span class="third-pts">${t.pts}pt${t.pts!==1?'s':''}</span>
    </div>`;
  });
  if(thirds.length<12){
    for(let i=thirds.length;i<12;i++){
      if(i===8) html+=`</div><div class="cut-line">— cut line · bottom 4 eliminated —</div><div class="third-card">`;
      html+=`<div class="third-row"><span class="third-rank" style="color:var(--faint)">${i+1}</span>

        <span class="third-gd">—</span><span class="third-pts" style="color:var(--faint)">—</span></div>`;
    }
  }
  html+=`</div>`;
  document.getElementById('third').innerHTML=html;
}

/* ── Render a single fixture card (group stage event from allEvents) ── */
function renderEventCard(ev) {
  const isLive = ev.isLive, isDone = ev.isDone;

  if (isDone || isLive) {
    centerHtml = `<div class="fx-score" style="${isLive?'color:var(--red)':''}">${ev.s1}–${ev.s2}</div><div class="fx-round">${isLive?`LIVE ${ev.clock}`:'FT'}</div>`;
  } else {
    centerHtml = `<div class="fx-vs">vs</div><div class="fx-round">Group</div>`;
  }
  return `<div class="fixture ${isLive?'live-now':''} ${isDone?'fx-done':''}">
    <div class="fx-head">
      <span class="fx-time ${isLive?'is-live':''}">🕐 ${ev.cestTime} CEST${isLive?`<span class="live-badge">LIVE ${ev.clock||''}</span>`:''}</span>
      <span class="fx-meta">${ev.venue||''}</span>
    </div>
    <div class="fx-body">
      <div class="fx-team"><span class="fx-flag">${ev.flag1}</span><span class="fx-name">${ev.team1}</span></div>
      <div class="fx-center">${centerHtml}</div>
      <div class="fx-team"><span class="fx-flag">${ev.flag2}</span><span class="fx-name">${ev.team2}</span></div>
    </div>
  </div>`;
}

/* ── Render a knockout fixture card ── */
function renderFixtureCard(f) {
  const r1 = resolveSlot(f.slot1), r2 = resolveSlot(f.slot2);
  const k = scoreKey(r1.name||'', r2.name||'');
  const sc = scoreMap[k];
  const isLive = sc?.isLive, isDone = sc?.isDone;
  let centerHtml;
  if (isDone || isLive) {
    const s1 = sc.team1===r1.name ? sc.s1 : sc.s2;
    const s2 = sc.team1===r1.name ? sc.s2 : sc.s1;
    centerHtml = `<div class="fx-score" style="${isLive?'color:var(--red)':''}">${s1}–${s2}</div><div class="fx-round">${isLive?`LIVE ${sc.clock}`:'FT'}</div>`;
  } else {
    centerHtml = `<div class="fx-vs">vs</div><div class="fx-round">${f.round}</div>`;
  }
  const n1cls = r1.proj?'proj':(!r1.name||r1.name.startsWith('W ')||r1.name.startsWith('Best'))?'tbd-name':'';
  const n2cls = r2.proj?'proj':(!r2.name||r2.name.startsWith('W ')||r2.name.startsWith('Best'))?'tbd-name':'';
  return `<div class="fixture ${isLive?'live-now':''} ${isDone?'fx-done':''}">
    <div class="fx-head">
      <span class="fx-time ${isLive?'is-live':''}">🕐 ${f.cest} CEST${isLive?`<span class="live-badge">LIVE ${sc?.clock||''}</span>`:''}</span>
      <span class="fx-meta">${f.id} · ${f.venue}</span>
    </div>
    <div class="fx-body">
      <div class="fx-team"><span class="fx-flag">${r1.flag}</span><span class="fx-name ${n1cls}">${r1.name||'TBD'}</span></div>
      <div class="fx-center">${centerHtml}</div>
      <div class="fx-team"><span class="fx-flag">${r2.flag}</span><span class="fx-name ${n2cls}">${r2.name||'TBD'}</span></div>
    </div>
  </div>`;
}

  /* ── Today banner: show today's matches (group or knockout) ── */
  let todayHtml = '';
  const todayGS = allEvents[todayStr] || [];
  const todayKO = FIXTURES.filter(f => f.cestDate === todayStr);

  if (todayGS.length === 0 && todayKO.length === 0) {
    todayHtml = `<div class="today-no-games">No matches today</div>`;
  } else {
    /* group stage today */
    todayGS.sort((a,b) => a.cestTime.localeCompare(b.cestTime)).forEach(ev => {
      const isLive = ev.isLive, isDone = ev.isDone;
      let scoreHtml = isDone||isLive ? `<span class="tc-score">${ev.s1}–${ev.s2}</span>` : `<span class="tc-vs">vs</span>`;
      todayHtml += `<div class="tc ${isLive?'live-now':''}">
        <div class="tc-time">🕐 ${ev.cestTime}${isLive?` <span class="tc-live-badge">LIVE ${ev.clock||''}</span>`:isDone?' <span style="color:var(--faint);font-size:9px">FT</span>':''}</div>
        <div class="tc-flags"><span class="tc-flag">${ev.flag1}</span>${scoreHtml}<span class="tc-flag">${ev.flag2}</span></div>
        <div class="tc-names"><span class="tc-name">${ev.team1}</span><span class="tc-name">${ev.team2}</span></div>
        <div class="tc-meta">Group · ${ev.venue?.split(',')[0]||''}</div>
      </div>`;
    });
    /* knockout today */
    todayKO.forEach(f => {
      const r1 = resolveSlot(f.slot1), r2 = resolveSlot(f.slot2);
      const sc = scoreMap[scoreKey(r1.name||'', r2.name||'')];
      const isLive = sc?.isLive, isDone = sc?.isDone;
      let scoreHtml;
      if (isDone||isLive) {
        const s1 = sc.team1===r1.name ? sc.s1 : sc.s2;
        const s2 = sc.team1===r1.name ? sc.s2 : sc.s1;
        scoreHtml = `<span class="tc-score">${s1}–${s2}</span>`;
      } else {
        scoreHtml = `<span class="tc-vs">vs</span>`;
      }
      todayHtml += `<div class="tc ${isLive?'live-now':''}">
        <div class="tc-time">🕐 ${f.cest}${isLive?` <span class="tc-live-badge">LIVE ${sc?.clock||''}</span>`:isDone?' <span style="color:var(--faint);font-size:9px">FT</span>':''}</div>
        <div class="tc-flags"><span class="tc-flag">${r1.flag}</span>${scoreHtml}<span class="tc-flag">${r2.flag}</span></div>
        <div class="tc-names"><span class="tc-name">${r1.name||'TBD'}</span><span class="tc-name">${r2.name||'TBD'}</span></div>
        <div class="tc-meta">${f.id} · ${f.round} · ${f.venue.split(',')[0]}</div>
      </div>`;
    });
  }

  /* ── Full fixture list ── */
  let listHtml = '';
  allDates.forEach(date => {
    const isToday = date === todayStr;
    const isPast  = date < todayStr;
    const gsEvs = (allEvents[date] || []).sort((a,b) => a.cestTime.localeCompare(b.cestTime));
    const koFxs = FIXTURES.filter(f => f.cestDate === date).sort((a,b) => a.cest.localeCompare(b.cest));
    const total  = gsEvs.length + koFxs.length;
    if (total === 0) return;

    listHtml += `<div class="day-header">
      <span class="day-label ${isToday?'today-label':''}">${fmtDate(date)}${isToday?' · Today':isPast?' · Past':' · Upcoming'}</span>
      <span class="day-count">${total} match${total>1?'es':''}</span>
      <span class="day-sep"></span>
    </div>`;
    gsEvs.forEach(ev => { listHtml += renderEventCard(ev); });
    koFxs.forEach(f  => { listHtml += renderFixtureCard(f); });
  });

  document.getElementById('games').innerHTML = `
    <div class="today-banner">
      <div class="today-banner-label">📅 Today · ${fmtDate(todayStr)} · CEST</div>
      <div class="today-scroll">${todayHtml}</div>
    </div>
    <div style="padding:0 12px 0;">${listHtml}</div>`;
}

/* ── Tab switching ── */
function switchTab(id, navEl) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (navEl) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    navEl.classList.add('active');
  }
}
function setbn(id) {
  document.querySelectorAll('.bottom-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const map={'bn-groups':'groups','bn-bracket':'bracket','bn-third':'third','bn-games':'games'};
  if(map[id]){
    const tabs=['groups','bracket','third','games'];
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===map[id]));
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
