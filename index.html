<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC 2026 — Live Knockout Forecast</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #3b6d11; --green-bg: #eaf3de; --green-d: #27500a;
  --blue: #185fa5; --blue-bg: #e6f1fb; --blue-d: #0c447c;
  --amber: #ba7517; --amber-bg: #faeeda; --amber-d: #633806;
  --red-bg: #fcebeb; --red: #a32d2d; --red-dot: #e24b4a;
  --border: #e0e0e0; --bg: #f5f5f5; --card: #fff;
  --text: #1a1a1a; --muted: #666; --faint: #999;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.live-pill { display: flex; align-items: center; gap: 5px; background: var(--red-bg); color: var(--red); font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 20px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red-dot); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.refresh-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; color: var(--muted); }
.sub-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
.last-updated { font-size: 11px; color: var(--faint); }
.api-status { font-size: 11px; }

.nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
.nav-btn { flex: 1; padding: 11px 4px; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); border-bottom: 2.5px solid transparent; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.nav-btn.active { color: var(--green); border-bottom-color: var(--green); }

.view { display: none; padding: 12px 12px 80px; }
.view.active { display: block; }

.stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

.legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 4px 0 10px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

.group-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.group-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 13px; background: var(--bg); border-bottom: 1px solid var(--border); }
.group-name { font-size: 13px; font-weight: 600; }
.chip { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
.chip-done { background: var(--green-bg); color: var(--green-d); }
.chip-pend { background: var(--amber-bg); color: var(--amber-d); }

.team-row { display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-top: 1px solid var(--border); min-height: 42px; }
.team-pos { font-size: 11px; color: var(--faint); width: 13px; text-align: center; font-weight: 700; }
.team-flag { font-size: 18px; width: 24px; }
.team-name { font-size: 13px; flex: 1; }
.team-gd { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }
.team-pts { font-size: 13px; font-weight: 700; width: 36px; text-align: right; color: var(--text); }
.conf-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-left: 4px; vertical-align: middle; }
.q1 .team-name { color: var(--green-d); font-weight: 600; }
.q1 .team-pos { color: var(--green); }
.q2 .team-name { color: var(--blue-d); font-weight: 600; }
.q2 .team-pos { color: var(--blue); }
.q3 .team-name { color: var(--amber-d); }
.q3 .team-pos { color: var(--amber); }
.elim .team-name { color: var(--faint); text-decoration: line-through; }
.elim .team-pts { color: var(--faint); }
.sep { border-top: 2px dashed var(--border) !important; }

.round-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: 12px 0 6px; display: flex; align-items: center; gap: 8px; }
.round-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.match-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.match-meta { display: flex; justify-content: space-between; align-items: center; padding: 6px 13px; background: var(--bg); border-bottom: 1px solid var(--border); }
.match-meta-left { font-size: 11px; color: var(--muted); }
.status-conf { font-size: 10px; font-weight: 700; color: var(--green); }
.status-proj { font-size: 10px; font-weight: 700; color: var(--amber); }
.match-team { display: flex; align-items: center; gap: 10px; padding: 10px 13px; min-height: 44px; }
.match-team + .match-team { border-top: 1px solid var(--border); }
.match-team.conf { background: var(--green-bg); }
.match-team.conf .match-name { color: var(--green-d); font-weight: 600; }
.match-team.tbd .match-name { color: var(--faint); font-style: italic; }
.match-flag { font-size: 20px; width: 26px; }
.match-name { font-size: 14px; flex: 1; }
.match-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.badge-conf { background: var(--green-bg); color: var(--green-d); }
.badge-proj { background: var(--amber-bg); color: var(--amber-d); }
.badge-tbd { background: var(--bg); color: var(--faint); border: 1px solid var(--border); }

.info-box { background: var(--amber-bg); border-radius: 10px; padding: 10px 13px; font-size: 12px; color: var(--amber-d); margin-bottom: 10px; line-height: 1.5; }
.third-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
.third-row { display: flex; align-items: center; gap: 8px; padding: 9px 13px; border-top: 1px solid var(--border); min-height: 44px; }
.third-rank { font-size: 12px; font-weight: 700; width: 20px; text-align: center; }
.rank-in { color: var(--green); }
.rank-out { color: var(--faint); }
.third-flag { font-size: 18px; width: 24px; }
.third-name { font-size: 13px; flex: 1; }
.third-grp { font-size: 10px; color: var(--muted); background: var(--bg); padding: 2px 6px; border-radius: 8px; margin-left: 3px; }
.third-gd { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }
.third-pts { font-size: 13px; font-weight: 700; width: 36px; text-align: right; }
.third-row.in .third-name { color: var(--amber-d); font-weight: 600; }
.third-row.out .third-name { color: var(--faint); }
.cut-line { text-align: center; font-size: 11px; color: var(--amber-d); font-weight: 700; padding: 5px; background: var(--amber-bg); border-top: 1px dashed var(--amber); border-bottom: 1px dashed var(--amber); }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--card); border-top: 1px solid var(--border); z-index: 10; }
.bottom-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px 12px; font-size: 10px; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.bottom-btn.active { color: var(--green); }
.bottom-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; }

.loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.error-box { background: var(--red-bg); border-radius: 10px; padding: 12px; font-size: 12px; color: var(--red); margin: 12px; }

@media (min-width: 600px) {
  body { max-width: 430px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,.08); min-height: 100vh; }
  .bottom-nav { max-width: 430px; left: 50%; transform: translateX(-50%); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🏆 WC 2026 <div class="live-pill"><span class="live-dot"></span> Live</div></div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>
<div class="sub-header">
  <span class="last-updated" id="ts">Loading…</span>
  <span class="api-status" id="api-status"></span>
</div>

<div class="nav">
  <div class="nav-btn active" onclick="switchTab('groups',this)">Groups</div>
  <div class="nav-btn" onclick="switchTab('bracket',this)">Bracket R32</div>
  <div class="nav-btn" onclick="switchTab('third',this)">3rd place</div>
</div>

<div id="groups" class="view active"><div class="loading">⚽ Loading group standings…</div></div>
<div id="bracket" class="view"><div class="loading">⚽ Loading bracket…</div></div>
<div id="third" class="view"><div class="loading">⚽ Loading 3rd-place tracker…</div></div>

<div class="bottom-nav">
  <div class="bottom-btn active" id="bn-groups" onclick="switchTab('groups',null);setbn('bn-groups')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Groups
  </div>
  <div class="bottom-btn" id="bn-bracket" onclick="switchTab('bracket',null);setbn('bn-bracket')">
    <svg viewBox="0 0 24 24"><path d="M3 6h4v4H3zM17 6h4v4h-4zM3 14h4v4H3zM17 14h4v4h-4z"/><line x1="7" y1="8" x2="12" y2="8"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="12" y1="16" x2="17" y2="16"/></svg>Bracket
  </div>
  <div class="bottom-btn" id="bn-third" onclick="switchTab('third',null);setbn('bn-third')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M9 14l-1 4 4-2 4 2-1-4"/></svg>3rd place
  </div>
  <div class="bottom-btn" id="bn-alerts" onclick="alert('Push alerts coming soon!')">
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Alerts
  </div>
</div>

<script>
const FLAGS = {
  'MEX':'🇲🇽','KOR':'🇰🇷','CZE':'🇨🇿','RSA':'🇿🇦',
  'CAN':'🇨🇦','SUI':'🇨🇭','BIH':'🇧🇦','QAT':'🇶🇦',
  'BRA':'🇧🇷','MAR':'🇲🇦','SCO':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','HAI':'🇭🇹',
  'USA':'🇺🇸','AUS':'🇦🇺','PAR':'🇵🇾','TUR':'🇹🇷',
  'GER':'🇩🇪','CIV':'🇨🇮','ECU':'🇪🇨','CUW':'🇨🇼',
  'NED':'🇳🇱','JPN':'🇯🇵','SWE':'🇸🇪','TUN':'🇹🇳',
  'EGY':'🇪🇬','IRN':'🇮🇷','BEL':'🇧🇪','NZL':'🇳🇿',
  'ESP':'🇪🇸','URU':'🇺🇾','CPV':'🇨🇻','KSA':'🇸🇦',
  'FRA':'🇫🇷','NOR':'🇳🇴','SEN':'🇸🇳','IRQ':'🇮🇶',
  'ARG':'🇦🇷','AUT':'🇦🇹','JOR':'🇯🇴','ALG':'🇩🇿',
  'COL':'🇨🇴','COD':'🇨🇩','POR':'🇵🇹','UZB':'🇺🇿',
  'ENG':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','GHA':'🇬🇭','PAN':'🇵🇦','CRO':'🇭🇷',
  'SAU':'🇸🇦','VIE':'🇻🇳','LIB':'🇱🇧','ZAM':'🇿🇲'
};

const R32 = [
  {id:'M73', label:'M73 · 2A vs 2B',        date:'Jun 28', slot1:{pos:2,grp:'A'}, slot2:{pos:2,grp:'B'}},
  {id:'M74', label:'M74 · 1E vs best 3rd',   date:'Jun 28', slot1:{pos:1,grp:'E'}, slot2:{pos:3,pool:'A/B/C/D/F'}},
  {id:'M75', label:'M75 · 1F vs 2C',         date:'Jun 29', slot1:{pos:1,grp:'F'}, slot2:{pos:2,grp:'C'}},
  {id:'M76', label:'M76 · 1C vs 2F',         date:'Jun 29', slot1:{pos:1,grp:'C'}, slot2:{pos:2,grp:'F'}},
  {id:'M77', label:'M77 · 1I vs best 3rd',   date:'Jun 29', slot1:{pos:1,grp:'I'}, slot2:{pos:3,pool:'C/D/F/G/H'}},
  {id:'M78', label:'M78 · 2E vs 2I',         date:'Jun 30', slot1:{pos:2,grp:'E'}, slot2:{pos:2,grp:'I'}},
  {id:'M79', label:'M79 · 1A vs best 3rd',   date:'Jun 30', slot1:{pos:1,grp:'A'}, slot2:{pos:3,pool:'C/E/F/H/I'}},
  {id:'M80', label:'M80 · 1L vs best 3rd',   date:'Jun 30', slot1:{pos:1,grp:'L'}, slot2:{pos:3,pool:'E/H/I/J/K'}},
  {id:'M81', label:'M81 · 1D vs best 3rd',   date:'Jul 1',  slot1:{pos:1,grp:'D'}, slot2:{pos:3,pool:'B/E/F/I/J'}},
  {id:'M82', label:'M82 · 1G vs best 3rd',   date:'Jul 1',  slot1:{pos:1,grp:'G'}, slot2:{pos:3,pool:'A/E/H/I/J'}},
  {id:'M83', label:'M83 · 2K vs 2L',         date:'Jul 1',  slot1:{pos:2,grp:'K'}, slot2:{pos:2,grp:'L'}},
  {id:'M84', label:'M84 · 1H vs 2J',         date:'Jul 2',  slot1:{pos:1,grp:'H'}, slot2:{pos:2,grp:'J'}},
  {id:'M85', label:'M85 · 1B vs best 3rd',   date:'Jul 2',  slot1:{pos:1,grp:'B'}, slot2:{pos:3,pool:'E/F/G/I/J'}},
  {id:'M86', label:'M86 · 1J vs 2H',         date:'Jul 2',  slot1:{pos:1,grp:'J'}, slot2:{pos:2,grp:'H'}},
  {id:'M87', label:'M87 · 1K vs best 3rd',   date:'Jul 3',  slot1:{pos:1,grp:'K'}, slot2:{pos:3,pool:'D/E/I/J/L'}},
  {id:'M88', label:'M88 · 2D vs 2G',         date:'Jul 3',  slot1:{pos:2,grp:'D'}, slot2:{pos:2,grp:'G'}},
];

let groupData = {};

function getStat(stats, name) {
  const s = stats.find(s => s.name === name);
  return s ? (parseInt(s.value ?? s.displayValue) || 0) : 0;
}

function flag(abbr) {
  return FLAGS[abbr] || FLAGS[abbr?.toUpperCase()] || '🏳';
}

function isConfirmed(entry) {
  return entry.note && entry.note.description && entry.note.description.toLowerCase().includes('advance');
}

function isEliminated(entry) {
  return entry.note && entry.note.description && entry.note.description.toLowerCase().includes('eliminat');
}

function gdStr(gd) {
  return gd > 0 ? '+' + gd : '' + gd;
}

async function loadData() {
  document.getElementById('ts').textContent = 'Refreshing…';
  document.getElementById('api-status').textContent = '';
  try {
    const r = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    parseAndRender(data);
    document.getElementById('ts').textContent = 'Updated: ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('api-status').innerHTML = '<span style="color:var(--green)">● ESPN live</span>';
  } catch(e) {
    document.getElementById('ts').textContent = 'Failed to load — tap refresh';
    document.getElementById('api-status').innerHTML = '<span style="color:var(--red)">● offline</span>';
    document.getElementById('groups').innerHTML = '<div class="error-box">Could not reach ESPN API. Check your connection and tap Refresh.<br><br><small>' + e.message + '</small></div>';
  }
}

function parseAndRender(data) {
  groupData = {};
  const groups = data.children || [];

  groups.forEach(group => {
    const letter = (group.abbreviation || group.name || '').replace(/\D/g,'') ||
                   (group.name || '').slice(-1).toUpperCase();
    const grpLetter = (group.name || '').match(/Group ([A-L])/i)?.[1]?.toUpperCase() ||
                      (group.abbreviation || '').toUpperCase().replace('GROUP','').trim();
    const key = grpLetter || letter;
    if (!key) return;

    const entries = (group.standings?.entries || group.entries || []).map(e => {
      const stats = e.stats || [];
      return {
        team: e.team,
        abbr: e.team?.abbreviation || '',
        name: e.team?.displayName || e.team?.name || '?',
        pts:  getStat(stats, 'points'),
        gp:   getStat(stats, 'gamesPlayed'),
        gf:   getStat(stats, 'pointsFor'),
        ga:   getStat(stats, 'pointsAgainst'),
        gd:   getStat(stats, 'pointDifferential'),
        confirmed: isConfirmed(e),
        eliminated: isEliminated(e),
        note: e.note?.description || '',
      };
    }).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

    groupData[key] = { letter: key, entries, name: group.name };
  });

  renderGroups();
  renderBracket();
  renderThird();
}

function renderGroups() {
  const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let confirmed = 0, projected = 0, pending = 0;

  LETTERS.forEach(k => {
    const g = groupData[k];
    if (!g) return;
    g.entries.forEach((e,i) => {
      if (i < 2 && e.confirmed) confirmed++;
      else if (i < 2) projected++;
    });
    const played = g.entries.reduce((s,e) => s + e.gp, 0) / g.entries.length;
    if (played < 3) pending++;
  });

  let html = `
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${confirmed}</div><div class="stat-label">Confirmed</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${projected}</div><div class="stat-label">Projected</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${pending}</div><div class="stat-label">Groups active</div></div>
    </div>
    <div class="legend">
      <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>1st place</div>
      <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>2nd place</div>
      <div class="leg"><span class="leg-dot" style="background:var(--amber)"></span>3rd · wildcard?</div>
    </div>`;

  LETTERS.forEach(k => {
    const g = groupData[k];
    if (!g) return;
    const avgGP = g.entries.length ? g.entries.reduce((s,e)=>s+e.gp,0)/g.entries.length : 0;
    const complete = avgGP >= 3;
    const qualNames = g.entries.slice(0,2).filter(e=>e.confirmed).map(e=>e.name.split(' ').pop());
    const chipHtml = qualNames.length === 2
      ? `<span class="chip chip-done">✓ ${qualNames.join(' &amp; ')}</span>`
      : qualNames.length === 1
      ? `<span class="chip chip-done">✓ ${qualNames[0]} qualified</span>`
      : complete
      ? `<span class="chip chip-done">✓ Group complete</span>`
      : `<span class="chip chip-pend">${3 - Math.floor(avgGP)} match${3-Math.floor(avgGP)>1?'es':''} left</span>`;

    html += `<div class="group-card">
      <div class="group-header"><span class="group-name">Group ${k}</span>${chipHtml}</div>`;

    g.entries.forEach((e, i) => {
      const posClass = i === 0 ? 'q1' : i === 1 ? 'q2' : i === 2 ? 'q3' : '';
      const elimClass = e.eliminated ? 'elim' : '';
      const confDot = e.confirmed && i < 2 ? '<span class="conf-dot"></span>' : '';
      const sepClass = i === 2 ? 'sep' : '';
      html += `<div class="team-row ${posClass} ${elimClass} ${sepClass}">
        <span class="team-pos">${i+1}</span>
        <span class="team-flag">${flag(e.abbr)}</span>
        <span class="team-name">${e.name}${confDot}</span>
        <span class="team-gd">${gdStr(e.gd)}</span>
        <span class="team-pts">${e.pts} pt${e.pts!==1?'s':''}</span>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('groups').innerHTML = html;
}

function getTeam(grp, pos) {
  const g = groupData[grp];
  if (!g) return null;
  return g.entries[pos - 1] || null;
}

function slotHtml(slot, allThirds) {
  if (slot.pool) {
    return {
      flag: '🔲',
      name: `Best 3rd from ${slot.pool}`,
      badge: `<span class="match-badge badge-tbd">TBD</span>`,
      conf: false,
      tbd: true,
    };
  }
  const team = getTeam(slot.grp, slot.pos);
  if (!team) return { flag:'🔲', name:'TBD', badge:`<span class="match-badge badge-tbd">TBD</span>`, conf:false, tbd:true };
  const conf = team.confirmed;
  const label = `${slot.pos}${slot.grp}`;
  return {
    flag: flag(team.abbr),
    name: team.name,
    badge: conf
      ? `<span class="match-badge badge-conf">${label} ✓</span>`
      : `<span class="match-badge badge-proj">${label} proj.</span>`,
    conf,
    tbd: false,
  };
}

function renderBracket() {
  const allThirds = getAllThirds();
  let html = `<div class="info-box">Based on current standings · R32 kicks off Jun 28 · auto-refreshes every 60s</div>`;

  R32.forEach(m => {
    const s1 = slotHtml(m.slot1, allThirds);
    const s2 = slotHtml(m.slot2, allThirds);
    const bothConf = s1.conf && s2.conf;
    const oneConf = s1.conf || s2.conf;
    const statusHtml = bothConf
      ? `<span class="status-conf">✓ Both confirmed</span>`
      : oneConf
      ? `<span class="status-conf">✓ 1 slot confirmed</span>`
      : `<span class="status-proj">⚠ projected</span>`;

    html += `<div class="round-label">${m.label}</div>
    <div class="match-card">
      <div class="match-meta"><span class="match-meta-left">${m.date}</span>${statusHtml}</div>
      <div class="match-team ${s1.conf?'conf':''} ${s1.tbd?'tbd':''}">
        <span class="match-flag">${s1.flag}</span>
        <span class="match-name">${s1.name}</span>${s1.badge}
      </div>
      <div class="match-team ${s2.conf?'conf':''} ${s2.tbd?'tbd':''}">
        <span class="match-flag">${s2.flag}</span>
        <span class="match-name">${s2.name}</span>${s2.badge}
      </div>
    </div>`;
  });

  document.getElementById('bracket').innerHTML = html;
}

function getAllThirds() {
  const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const thirds = [];
  LETTERS.forEach(k => {
    const g = groupData[k];
    if (!g || g.entries.length < 3) return;
    const t = g.entries[2];
    thirds.push({ ...t, grp: k });
  });
  thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  return thirds;
}

function renderThird() {
  const thirds = getAllThirds();
  const groupsLeft = Object.values(groupData).filter(g => {
    const avg = g.entries.reduce((s,e)=>s+e.gp,0) / g.entries.length;
    return avg < 3;
  }).length;

  let html = `<div class="info-box">
    Best 8 of 12 third-place teams advance. Ranked by pts → GD → GF.<br>
    ${groupsLeft > 0 ? `⚠ ${groupsLeft} group${groupsLeft>1?'s':''} still playing — ranking will change.` : '✓ All groups complete.'}
  </div>`;

  html += `<div class="third-card">
    <div class="group-header"><span class="group-name">3rd-place ranking</span><span class="chip chip-pend">${thirds.length}/12 groups</span></div>`;

  thirds.forEach((t, i) => {
    const advancing = i < 8;
    const rowClass = advancing ? 'in' : 'out';
    const rankClass = advancing ? 'rank-in' : 'rank-out';
    const cutBefore = i === 8 ? `</div><div class="cut-line">— cut line · bottom 4 eliminated —</div><div class="third-card">` : '';
    html += cutBefore + `<div class="third-row ${rowClass}">
      <span class="third-rank ${rankClass}">${i+1}</span>
      <span class="third-flag">${flag(t.abbr)}</span>
      <span class="third-name">${t.name}<span class="third-grp">${t.grp}</span></span>
      <span class="third-gd">${gdStr(t.gd)}</span>
      <span class="third-pts">${t.pts} pt${t.pts!==1?'s':''}</span>
    </div>`;
  });

  if (thirds.length < 12) {
    const missing = 12 - thirds.length;
    for (let i = 0; i < missing; i++) {
      html += `<div class="third-row">
        <span class="third-rank" style="color:var(--faint)">${thirds.length+i+1}</span>
        <span class="third-flag">🔲</span>
        <span class="third-name" style="color:var(--faint);font-style:italic">Pending…</span>
        <span class="third-gd">—</span>
        <span class="third-pts" style="color:var(--faint)">—</span>
      </div>`;
    }
  }

  html += `</div>`;
  document.getElementById('third').innerHTML = html;
}

function switchTab(id, navEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (navEl) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    navEl.classList.add('active');
  }
}
function setbn(id) {
  document.querySelectorAll('.bottom-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const map = {'bn-groups':'groups','bn-bracket':'bracket','bn-third':'third'};
  if (map[id]) {
    const tabs = ['groups','bracket','third'];
    document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', tabs[i] === map[id]));
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
